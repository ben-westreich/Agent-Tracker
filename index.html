<!DOCTYPE html>
<html lang="en">
<head>

  <meta http-equiv="refresh" content="0; url=https://r1-concepts-marketing-dev.github.io/Agent-Tracker/">
  <title>Redirecting...</title>
  <script>
    // Preserve the path so deep links still work
    // e.g. /agents/weekly-checkup-bot.html → redirects to the same path on the new domain
    var newBase = "https://r1-concepts-marketing-dev.github.io/Agent-Tracker";
    var path = window.location.pathname.replace(/^\/Agent-Tracker/, "") || "/";
    window.location.replace(newBase + path + window.location.search + window.location.hash);
  </script>
</head>
<body>
  <p style="font-family:sans-serif;color:#666;text-align:center;margin-top:80px;">
    Redirecting to the new location…<br>

  </p>
</body>
</html>
